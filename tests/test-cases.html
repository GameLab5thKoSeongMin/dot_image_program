<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Icon Generator Tests</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --border: #d7dcd1;
      --text: #20251f;
      --muted: #667064;
      --pass: #2f7d56;
      --fail: #b3261e;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    button {
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid var(--pass);
      border-radius: 6px;
      background: var(--pass);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    .summary {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .case {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .case h2 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .case p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .preview-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .source-preview,
    .result-preview {
      width: 96px;
      height: 96px;
      border: 1px solid var(--border);
      object-fit: contain;
      background:
        linear-gradient(45deg, #e2e6de 25%, transparent 25%),
        linear-gradient(-45deg, #e2e6de 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e2e6de 75%),
        linear-gradient(-45deg, transparent 75%, #e2e6de 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    .result-preview {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .status {
      font-weight: 700;
    }

    .status.pass {
      color: var(--pass);
    }

    .status.fail {
      color: var(--fail);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Pixel Icon Generator Test Cases</h1>
      <button id="runTestsButton" type="button">Run verification</button>
    </header>
    <p id="summary" class="summary">Click the button to run conversion, validation, and export checks.</p>
    <section id="results" class="grid" aria-live="polite"></section>
  </main>

  <script src="../src/constants.js"></script>
  <script src="../src/fileHandler.js"></script>
  <script src="../src/imageProcessor.js"></script>
  <script src="../src/paletteQuantizer.js"></script>
  <script src="../src/exporter.js"></script>
  <script src="../src/uiController.js"></script>
  <script src="./testImageFactory.js"></script>
  <script>
    (function () {
      "use strict";

      var button = document.getElementById("runTestsButton");
      var results = document.getElementById("results");
      var summary = document.getElementById("summary");
      var factory = window.PixelIconTestImageFactory;
      var processor = window.PixelIconImageProcessor;
      var quantizer = window.PixelIconPaletteQuantizer;
      var fileHandler = window.PixelIconFileHandler;
      var exporter = window.PixelIconExporter;
      var constants = window.PixelIconConstants;

      function canvasToImage(canvas, className, alt) {
        var image = new Image();
        image.className = className;
        image.alt = alt;
        image.src = canvas.toDataURL("image/png");
        return image;
      }

      function createCaseElement(testCase) {
        var article = document.createElement("article");
        var title = document.createElement("h2");
        var description = document.createElement("p");
        var previewRow = document.createElement("div");
        var status = document.createElement("div");

        article.className = "case";
        title.textContent = testCase.name;
        description.textContent = testCase.description || "";
        previewRow.className = "preview-row";

        if (testCase.sourceCanvas) {
          previewRow.appendChild(canvasToImage(testCase.sourceCanvas, "source-preview", testCase.name + " source"));
        }

        if (testCase.resultCanvas) {
          previewRow.appendChild(canvasToImage(testCase.resultCanvas, "result-preview", testCase.name + " result"));
        }

        status.className = "status " + (testCase.pass ? "pass" : "fail");
        status.textContent = (testCase.pass ? "Pass: " : "Fail: ") + testCase.note;

        article.appendChild(title);
        article.appendChild(description);
        if (previewRow.children.length) {
          article.appendChild(previewRow);
        }
        article.appendChild(status);
        return article;
      }

      async function canvasToImageElement(canvas) {
        return await processor.loadImageFromDataURL(canvas.toDataURL("image/png"));
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      async function runConversionCase(name, sourceCanvas, options) {
        var image = await canvasToImageElement(sourceCanvas);
        var result = processor.convertImageToPixelIcon(image, options);
        assert(result.width === options.outputWidth, "Unexpected width " + result.width);
        assert(result.height === options.outputHeight, "Unexpected height " + result.height);
        return {
          name: name,
          description: options.outputWidth + "x" + options.outputHeight + " " + options.samplingMode,
          sourceCanvas: sourceCanvas,
          resultCanvas: result.canvas,
          pass: true,
          note: "output is " + result.width + "x" + result.height + "."
        };
      }

      async function runLegacyCases() {
        var cases = factory.createTestImages();
        var results = [];

        for (var index = 0; index < cases.length; index += 1) {
          var testCase = cases[index];
          var image = await canvasToImageElement(testCase.canvas);
          var result = processor.convertImageToPixelIcon(image, {
            outputWidth: 32,
            outputHeight: 32,
            samplingMode: "median"
          });
          assert(result.width === 32 && result.height === 32, "Legacy 32x32 output failed");
          results.push({
            name: "Legacy default: " + testCase.name,
            description: testCase.description,
            sourceCanvas: testCase.canvas,
            resultCanvas: result.canvas,
            pass: true,
            note: "32x32 median conversion still works."
          });
        }

        return results;
      }

      function runValidationCase(name, width, height, imageWidth, imageHeight, shouldPass) {
        var validation = fileHandler.validateOutputSize(width, height, imageWidth, imageHeight);
        assert(validation.valid === shouldPass, "Validation result mismatch: " + validation.message);

        return {
          name: name,
          description: width + "x" + height + " against " + imageWidth + "x" + imageHeight,
          pass: true,
          note: shouldPass ? "accepted as expected." : "rejected as expected."
        };
      }

      function runPerformanceWarningCase(name, width, height, expectedLevel) {
        var warning = fileHandler.getOutputSizePerformanceWarning(width, height);

        if (expectedLevel) {
          assert(warning && warning.level === expectedLevel, "Expected " + expectedLevel + " warning");
        } else {
          assert(!warning, "Unexpected performance warning");
        }

        return {
          name: name,
          description: width + "x" + height + " performance warning policy",
          pass: true,
          note: expectedLevel ? "warning level is " + expectedLevel + "." : "no warning as expected."
        };
      }

      function getFixtureAxisButtons(axis) {
        return Array.prototype.slice.call(document.querySelectorAll("#uiFixture .size-axis-button[data-axis='" + axis + "']"));
      }

      function createUiFixture() {
        var oldFixture = document.getElementById("uiFixture");
        if (oldFixture) {
          oldFixture.remove();
        }

        var fixture = document.createElement("div");
        fixture.id = "uiFixture";
        fixture.hidden = true;
        fixture.innerHTML =
          '<input id="fileInput" type="file">' +
          '<div id="dropZone"></div>' +
          '<img id="originalPreview" hidden>' +
          '<p id="originalPlaceholder"></p>' +
          '<img id="resultPreview" hidden>' +
          '<p id="resultPlaceholder"></p>' +
          '<select id="resultZoomSelect"><option value="fit" selected>Fit</option><option value="actual">Actual</option><option value="8">8x</option><option value="16">16x</option></select>' +
          '<p id="errorMessage"></p>' +
          '<p id="statusMessage"></p>' +
          '<span id="sourceSizeLabel"></span>' +
          '<span id="resultMetaLabel"></span>' +
          '<span id="outputFilename"></span>' +
          '<span id="outputSize"></span>' +
          '<span id="outputMode"></span>' +
          '<span id="outputFormatLabel"></span>' +
          '<span id="outputPalette"></span>' +
          '<span id="resultSummary"></span>' +
          '<button id="downloadButton" type="button"></button>' +
          '<button id="convertButton" type="button"></button>' +
          '<button id="previewRefreshButton" type="button"></button>' +
          '<label id="customWidthField"><input id="outputWidthInput" type="number" value="32"></label>' +
          '<label id="customHeightField"><input id="outputHeightInput" type="number" value="32"></label>' +
          '<select id="samplingModeSelect"><option value="median" selected>median</option><option value="average">average</option><option value="center">center</option></select>' +
          '<select id="outputFormatSelect"><option value="png" selected>PNG</option><option value="jpg">JPG</option><option value="aseprite">Aseprite</option></select>' +
          '<select id="paletteModeSelect"><option value="off" selected>off</option><option value="auto">auto</option><option value="custom">custom</option></select>' +
          '<label id="customPaletteField"><input id="customPaletteCountInput" type="number" value="16"></label>' +
          '<p id="paletteSummary"></p>' +
          '<button class="size-axis-button" type="button" data-axis="width" data-value="16">16</button>' +
          '<button class="size-axis-button is-selected" type="button" data-axis="width" data-value="32">32</button>' +
          '<button class="size-axis-button" type="button" data-axis="width" data-value="64">64</button>' +
          '<button class="size-axis-button" type="button" data-axis="width" data-value="original">Original</button>' +
          '<button class="size-axis-button" type="button" data-axis="width" data-value="custom">Custom</button>' +
          '<button class="size-axis-button" type="button" data-axis="height" data-value="16">16</button>' +
          '<button class="size-axis-button is-selected" type="button" data-axis="height" data-value="32">32</button>' +
          '<button class="size-axis-button" type="button" data-axis="height" data-value="64">64</button>' +
          '<button class="size-axis-button" type="button" data-axis="height" data-value="original">Original</button>' +
          '<button class="size-axis-button" type="button" data-axis="height" data-value="custom">Custom</button>' +
          '<div id="warningBanner" hidden><span id="warningMessage"></span><button id="warningCloseButton" type="button"></button></div>';
        document.body.appendChild(fixture);
        return fixture;
      }

      function runSizeUiCases() {
        var ui = window.PixelIconUIController;
        var fixture = createUiFixture();
        var elements = ui.initUI();
        var widthValues = getFixtureAxisButtons("width").map(function (button) {
          return button.getAttribute("data-value");
        }).join(",");
        var heightValues = getFixtureAxisButtons("height").map(function (button) {
          return button.getAttribute("data-value");
        }).join(",");
        var widthOriginalButton = getFixtureAxisButtons("width").find(function (button) {
          return button.getAttribute("data-value") === "original";
        });
        var heightOriginalButton = getFixtureAxisButtons("height").find(function (button) {
          return button.getAttribute("data-value") === "original";
        });
        var width32Button = getFixtureAxisButtons("width").find(function (button) {
          return button.getAttribute("data-value") === "32";
        });
        var height64Button = getFixtureAxisButtons("height").find(function (button) {
          return button.getAttribute("data-value") === "64";
        });
        var sourceCanvas = factory.createSolidColorImage();

        assert(ui.getSelectedAxisOption("width") === "32", "Default width option should be 32");
        assert(ui.getSelectedAxisOption("height") === "32", "Default height option should be 32");
        assert(widthValues === "16,32,64,original,custom", "Width option list mismatch: " + widthValues);
        assert(heightValues === "16,32,64,original,custom", "Height option list mismatch: " + heightValues);
        assert(elements.customWidthField.hidden, "Custom width field should start hidden");
        assert(elements.customHeightField.hidden, "Custom height field should start hidden");
        assert(widthOriginalButton.disabled && heightOriginalButton.disabled, "Original should start disabled");

        ui.selectSizeOption("width", "custom");
        ui.selectSizeOption("height", "custom");
        assert(!elements.customWidthField.hidden, "Custom width field should show after selecting custom");
        assert(!elements.customHeightField.hidden, "Custom height field should show after selecting custom");

        ui.updateSizeControls(20, 40);
        assert(width32Button.disabled, "Width 32 should be disabled for a 20px source width");
        assert(height64Button.disabled, "Height 64 should be disabled for a 40px source height");
        assert(!widthOriginalButton.disabled && !heightOriginalButton.disabled, "Original should enable after image load");

        ui.showOriginalPreview(sourceCanvas.toDataURL("image/png"), sourceCanvas.width, sourceCanvas.height);
        assert(!elements.originalPreview.hidden && elements.originalPreview.hasAttribute("src"), "Original preview should show valid image source");
        ui.clearOriginalPreview();
        assert(elements.originalPreview.hidden && !elements.originalPreview.hasAttribute("src"), "Original preview should clear image source");
        assert(!elements.originalPlaceholder.hidden, "Original placeholder should be visible after clear");

        ui.showResultPreview(sourceCanvas);
        assert(!elements.resultPreview.hidden && elements.resultPreview.hasAttribute("src"), "Result preview should show valid image source");
        elements.resultZoomSelect.value = "8";
        ui.applyResultZoom();
        assert(elements.resultPreview.style.width === (sourceCanvas.width * 8) + "px", "Result preview 8x zoom failed");
        ui.clearResultPreview();
        assert(elements.resultPreview.hidden && !elements.resultPreview.hasAttribute("src"), "Result preview should clear image source");
        assert(!elements.resultPlaceholder.hidden, "Result placeholder should be visible after clear");

        elements.originalPreview.hidden = false;
        elements.originalPreview.setAttribute("src", "#");
        elements.originalPreview.dispatchEvent(new Event("error"));
        assert(elements.originalPreview.hidden && !elements.originalPreview.hasAttribute("src"), "Broken original image should be hidden");

        fixture.remove();

        return [
          {
            name: "Size UI defaults and options",
            description: "Separate width and height controls expose 16, 32, 64, Original, and Custom.",
            pass: true,
            note: "defaults and option lists are valid."
          },
          {
            name: "Custom size visibility",
            description: "Custom inputs are hidden until Custom is selected.",
            pass: true,
            note: "custom fields toggle correctly."
          },
          {
            name: "Original and preset availability",
            description: "Original is disabled before image load and presets larger than source are disabled after load.",
            pass: true,
            note: "availability rules are valid."
          },
          {
            name: "Preview placeholders and zoom",
            description: "Preview images start clean, clear without broken src, and result zoom can be applied.",
            pass: true,
            note: "placeholder and zoom behavior are valid."
          },
          {
            name: "Broken original preview handling",
            description: "A failed image preview load is hidden and restored to the placeholder state.",
            pass: true,
            note: "broken image icon is prevented."
          }
        ];
      }

      async function runExportCases() {
        var sourceCanvas = factory.createTransparentShapeImage();
        var image = await canvasToImageElement(sourceCanvas);
        var result = processor.convertImageToPixelIcon(image, {
          outputWidth: 32,
          outputHeight: 32,
          samplingMode: "median"
        });
        var pngBlob = await exporter.exportCanvas(result.canvas, "png");
        var jpgBlob = await exporter.exportCanvas(result.canvas, "jpg");
        var asepriteBuffer = exporter.createAsepriteArrayBuffer(result.canvas);
        var asepriteBlob = exporter.createAsepriteBlob(result.canvas);
        var asepriteHeader = exporter.inspectAsepriteArrayBuffer(asepriteBuffer);
        var pngSignature = new Uint8Array(asepriteBuffer.slice(0, 8));
        var filename = fileHandler.createOutputFilename("sample.png", {
          outputWidth: 48,
          outputHeight: 32,
          samplingMode: "center",
          outputFormat: "aseprite"
        });
        var whiteCanvas = exporter.createWhiteBackgroundCanvas(result.canvas);

        assert(pngBlob.size > 0 && pngBlob.type === "image/png", "PNG blob failed");
        assert(jpgBlob.size > 0 && jpgBlob.type === "image/jpeg", "JPG blob failed");
        assert(!exporter.canvasHasTransparency(whiteCanvas), "JPG white background composite should be opaque");
        assert(asepriteBlob.size > 0, "Aseprite blob empty");
        assert(asepriteHeader.magic === constants.ASEPRITE_MAGIC, "Aseprite file magic mismatch");
        assert(asepriteHeader.frameMagic === constants.ASEPRITE_FRAME_MAGIC, "Aseprite frame magic mismatch");
        assert(asepriteHeader.width === 32 && asepriteHeader.height === 32, "Aseprite dimensions mismatch");
        assert(asepriteHeader.colorDepth === 32, "Aseprite color depth mismatch");
        assert(!(pngSignature[0] === 0x89 && pngSignature[1] === 0x50 && pngSignature[2] === 0x4e && pngSignature[3] === 0x47), "Aseprite export is a PNG");
        assert(filename === "sample_48x32_center.aseprite", "Filename rule failed: " + filename);

        return [
          {
            name: "PNG export",
            description: "Blob export using image/png.",
            sourceCanvas: sourceCanvas,
            resultCanvas: result.canvas,
            pass: true,
            note: "PNG blob is non-empty."
          },
          {
            name: "JPG export",
            description: "Blob export using image/jpeg with white compositing.",
            sourceCanvas: sourceCanvas,
            resultCanvas: whiteCanvas,
            pass: true,
            note: "JPG blob is non-empty and transparency is composited."
          },
          {
            name: "Aseprite export",
            description: "Binary header and frame magic validation.",
            sourceCanvas: sourceCanvas,
            resultCanvas: result.canvas,
            pass: true,
            note: "Aseprite binary has expected magic, dimensions, and color depth."
          },
          {
            name: "Filename generation",
            description: "Filename includes size, sampling mode, and extension.",
            pass: true,
            note: filename
          }
        ];
      }

      function runAutoPaletteCase(name, width, height, expectedColors) {
        var resolved = quantizer.resolveEffectivePaletteCount("auto", null, width, height);
        assert(resolved === expectedColors, "Expected " + expectedColors + " colors, got " + resolved);

        return {
          name: name,
          description: width + "x" + height + " auto palette",
          pass: true,
          note: "auto resolved to " + resolved + " colors."
        };
      }

      async function runPaletteLimitCase(name, sourceCanvas, conversionOptions, paletteOptions, expectedMaxColors) {
        var image = await canvasToImageElement(sourceCanvas);
        var converted = processor.convertImageToPixelIcon(image, conversionOptions);
        var limited = quantizer.applyPaletteLimitToCanvas(converted.canvas, paletteOptions);
        var expectedLimit = expectedMaxColors || limited.effectivePaletteCount;

        if (paletteOptions.paletteMode === "off") {
          assert(limited.canvas === converted.canvas, "Palette off should preserve the original canvas object");
        } else {
          assert(limited.afterColorCount <= expectedLimit, "Palette limit exceeded: " + limited.afterColorCount + " > " + expectedLimit);
        }

        return {
          name: name,
          description: conversionOptions.samplingMode + " + palette " + paletteOptions.paletteMode,
          sourceCanvas: sourceCanvas,
          resultCanvas: limited.canvas,
          pass: true,
          note: "visible colors " + limited.beforeColorCount + " -> " + limited.afterColorCount + "."
        };
      }

      async function runPaletteTransparencyCase() {
        var sourceCanvas = factory.createTransparentShapeImage();
        var image = await canvasToImageElement(sourceCanvas);
        var converted = processor.convertImageToPixelIcon(image, {
          outputWidth: 32,
          outputHeight: 32,
          samplingMode: "median"
        });
        var sourceContext = converted.canvas.getContext("2d", { willReadFrequently: true });
        var sourceImageData = sourceContext.getImageData(0, 0, 32, 32);
        var limited = quantizer.applyPaletteLimitToCanvas(converted.canvas, {
          paletteMode: "4"
        });
        var limitedContext = limited.canvas.getContext("2d", { willReadFrequently: true });
        var limitedImageData = limitedContext.getImageData(0, 0, 32, 32);

        for (var index = 3; index < sourceImageData.data.length; index += 4) {
          if (sourceImageData.data[index] < constants.TRANSPARENT_ALPHA_THRESHOLD) {
            assert(limitedImageData.data[index] < constants.TRANSPARENT_ALPHA_THRESHOLD, "Transparent pixel became visible");
          }
        }

        return {
          name: "Palette transparency preservation",
          description: "Transparent pixels remain transparent after quantization.",
          sourceCanvas: sourceCanvas,
          resultCanvas: limited.canvas,
          pass: true,
          note: "transparent pixels were preserved."
        };
      }

      async function runPaletteExportCase() {
        var sourceCanvas = factory.createLeftRightSplitImage();
        var image = await canvasToImageElement(sourceCanvas);
        var converted = processor.convertImageToPixelIcon(image, {
          outputWidth: 32,
          outputHeight: 32,
          samplingMode: "average"
        });
        var limited = quantizer.applyPaletteLimitToCanvas(converted.canvas, {
          paletteMode: "4"
        });
        var pngBlob = await exporter.exportCanvas(limited.canvas, "png");
        var jpgBlob = await exporter.exportCanvas(limited.canvas, "jpg");
        var asepriteBuffer = exporter.createAsepriteArrayBuffer(limited.canvas);
        var asepriteHeader = exporter.inspectAsepriteArrayBuffer(asepriteBuffer);
        var filename = fileHandler.createOutputFilename("sample.png", {
          outputWidth: 32,
          outputHeight: 32,
          samplingMode: "average",
          outputFormat: "aseprite",
          paletteMode: "4",
          paletteCount: 4
        });

        assert(pngBlob.size > 0, "palette PNG export failed");
        assert(jpgBlob.size > 0, "palette JPG export failed");
        assert(asepriteHeader.width === 32 && asepriteHeader.height === 32, "palette Aseprite dimensions failed");
        assert(filename === "sample_32x32_average_p4.aseprite", "palette filename failed: " + filename);

        return {
          name: "Palette export compatibility",
          description: "PNG/JPG/Aseprite use the palette-limited canvas.",
          sourceCanvas: sourceCanvas,
          resultCanvas: limited.canvas,
          pass: true,
          note: "exports and filename suffix are valid."
        };
      }

      async function runTests() {
        var allResults = [];
        var failed = false;

        results.textContent = "";
        summary.textContent = "Running verification...";

        try {
          allResults = allResults.concat(await runLegacyCases());

          var solid = factory.createSolidColorImage();
          var split = factory.createLeftRightSplitImage();
          var wide = factory.createWideImage();

          allResults.push(await runConversionCase("16x16 median", solid, { outputWidth: 16, outputHeight: 16, samplingMode: "median" }));
          allResults.push(await runConversionCase("24x24 median", solid, { outputWidth: 24, outputHeight: 24, samplingMode: "median" }));
          allResults.push(await runConversionCase("32x32 median", solid, { outputWidth: 32, outputHeight: 32, samplingMode: "median" }));
          allResults.push(await runConversionCase("48x48 median", solid, { outputWidth: 48, outputHeight: 48, samplingMode: "median" }));
          allResults.push(await runConversionCase("64x64 median", solid, { outputWidth: 64, outputHeight: 64, samplingMode: "median" }));
          allResults.push(await runConversionCase("48x32 median", split, { outputWidth: 48, outputHeight: 32, samplingMode: "median" }));
          allResults.push(await runConversionCase("8x12 custom", solid, { outputWidth: 8, outputHeight: 12, samplingMode: "median" }));
          allResults.push(await runConversionCase("32x32 average", split, { outputWidth: 32, outputHeight: 32, samplingMode: "average" }));
          allResults.push(await runConversionCase("32x32 center", split, { outputWidth: 32, outputHeight: 32, samplingMode: "center" }));
          allResults.push(await runConversionCase("64x64 average", solid, { outputWidth: 64, outputHeight: 64, samplingMode: "average" }));
          allResults.push(await runConversionCase("48x32 center", wide, { outputWidth: 48, outputHeight: 32, samplingMode: "center" }));

          allResults.push(runValidationCase("Reject width greater than source", 129, 32, 128, 128, false));
          allResults.push(runValidationCase("Reject height greater than source", 32, 129, 128, 128, false));
          allResults.push(runValidationCase("Reject zero width", 0, 32, 128, 128, false));
          allResults.push(runValidationCase("Reject zero height", 32, 0, 128, 128, false));
          allResults.push(runValidationCase("Reject non-integer width", "12.5", 32, 128, 128, false));
          allResults.push(runValidationCase("Reject non-integer height", 32, "12.5", 128, 128, false));
          allResults.push(runValidationCase("Accept width above 256 within source", 300, 32, 512, 512, true));
          allResults.push(runValidationCase("Accept height above 256 within source", 32, 300, 512, 512, true));
          allResults.push(runValidationCase("Accept original-size output", 512, 384, 512, 384, true));
          allResults.push(runValidationCase("Accept custom 8x12", 8, 12, 20, 20, true));
          allResults.push(runValidationCase("Reject preset larger than source", 24, 24, 20, 20, false));

          allResults.push(runPerformanceWarningCase("No performance warning at 256x256", 256, 256, null));
          allResults.push(runPerformanceWarningCase("Moderate performance warning", 320, 240, "moderate"));
          allResults.push(runPerformanceWarningCase("Strong performance warning", 800, 600, "strong"));

          allResults = allResults.concat(runSizeUiCases());

          allResults = allResults.concat(await runExportCases());

          allResults.push(runAutoPaletteCase("Auto palette 16x16", 16, 16, 4));
          allResults.push(runAutoPaletteCase("Auto palette 24x24", 24, 24, 8));
          allResults.push(runAutoPaletteCase("Auto palette 32x32", 32, 32, 16));
          allResults.push(runAutoPaletteCase("Auto palette 48x32", 48, 32, 16));
          allResults.push(runAutoPaletteCase("Auto palette 64x64", 64, 64, 32));

          allResults.push(await runPaletteLimitCase("Palette off regression", split, { outputWidth: 32, outputHeight: 32, samplingMode: "median" }, { paletteMode: "off" }));
          allResults.push(await runPaletteLimitCase("Palette auto", split, { outputWidth: 32, outputHeight: 32, samplingMode: "median" }, { paletteMode: "auto" }, 16));
          allResults.push(await runPaletteLimitCase("Palette 4", split, { outputWidth: 32, outputHeight: 32, samplingMode: "median" }, { paletteMode: "4" }, 4));
          allResults.push(await runPaletteLimitCase("Palette 8", split, { outputWidth: 32, outputHeight: 32, samplingMode: "average" }, { paletteMode: "8" }, 8));
          allResults.push(await runPaletteLimitCase("Palette 16", split, { outputWidth: 32, outputHeight: 32, samplingMode: "center" }, { paletteMode: "16" }, 16));
          allResults.push(await runPaletteLimitCase("Palette 32", solid, { outputWidth: 64, outputHeight: 64, samplingMode: "average" }, { paletteMode: "32" }, 32));
          allResults.push(await runPaletteLimitCase("Palette custom", split, { outputWidth: 48, outputHeight: 32, samplingMode: "center" }, { paletteMode: "custom", customPaletteCount: 8 }, 8));

          var customLow = fileHandler.validatePaletteOptions("custom", "1");
          var customHigh = fileHandler.validatePaletteOptions("custom", "257");
          assert(!customLow.valid, "custom palette below 2 should fail");
          assert(!customHigh.valid, "custom palette above 256 should fail");
          allResults.push({
            name: "Custom palette validation",
            description: "Rejects values below 2 and above 256.",
            pass: true,
            note: "invalid custom counts are blocked."
          });

          allResults.push(await runPaletteLimitCase("One-color palette case", solid, { outputWidth: 32, outputHeight: 32, samplingMode: "median" }, { paletteMode: "16" }, 16));
          allResults.push(await runPaletteLimitCase("Fully transparent palette case", factory.createFullyTransparentImage(), { outputWidth: 32, outputHeight: 32, samplingMode: "median" }, { paletteMode: "4" }, 4));
          allResults.push(await runPaletteTransparencyCase());
          allResults.push(await runPaletteExportCase());
        } catch (error) {
          failed = true;
          allResults.push({
            name: "Verification failure",
            description: "Unexpected error during test execution.",
            pass: false,
            note: error.message
          });
        }

        allResults.forEach(function (result) {
          results.appendChild(createCaseElement(result));
        });

        var passCount = allResults.filter(function (result) {
          return result.pass;
        }).length;

        summary.textContent = passCount + " / " + allResults.length + " cases passed.";

        if (failed) {
          throw new Error("One or more tests failed.");
        }
      }

      button.addEventListener("click", runTests);

      if (new URLSearchParams(window.location.search).get("autorun") === "1") {
        window.setTimeout(function () {
          runTests().catch(function () {
            summary.setAttribute("data-failed", "true");
          });
        }, 0);
      }
    })();
  </script>
</body>
</html>
